spring.application.name=task-service

server.port=8082

spring.datasource.url=jdbc:mysql://localhost:3306/task_db
spring.datasource.username=Jeff
spring.datasource.password=rootmysql88!

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

user-service.base-url=http://localhost:8081

# RestClient timeout settings (milliseconds)
user-service.connect-timeout=3000
user-service.read-timeout=5000

management.endpoints.web.exposure.include=health,info,metrics,env,mappings
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.name=Task Service
info.app.description=Spring Boot Task Microservice
info.app.version=1.0.0